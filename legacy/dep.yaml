apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:4.4.25-focal
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
      volumes:
        - name: mongodb-data
          emptyDir: {}

---

apiVersion: v1
kind: Service
metadata:
  name: mongodb
spec:
  selector:
    app: mongodb
  ports:
    - protocol: TCP
      port: 27017

      targetPort: 27017


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: done
spec:
  replicas: 1
  selector:
    matchLabels:
      app: done
  template:
    metadata:
      labels:
        app: done
    spec:
      containers:
        - name: done
          image: trukhinyuri/done:latest
          ports:
            - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: done
spec:
  selector:
    app: done
  ports:
    - protocol: TCP
      port: 3001

      targetPort: 3001

